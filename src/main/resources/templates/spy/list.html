<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elimination Panel</title>
    <th:block th:replace="~{fragments/styles :: css}"></th:block>
</head>
<body>
<div class="container">
    <div class="header-section">
        <h1>Quản Trị Viên</h1>
        <p class="desc">Quản lý và loại bỏ người chơi</p>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 12px; font-size: 1.1rem;">Danh sách phòng chơi</h3>
        <div class="item-list">
            <th:block th:each="player : ${players}">
                <div th:if="${player.remove}" class="item-row" style="opacity: 0.6; background: rgba(239,68,68,0.05);">
                    <span style="text-decoration: line-through; color: var(--text-muted); font-weight: 500;"
                          th:text="${player.id + '. ' + player.userName}"></span>
                    <span class="badge badge-red">Đã Loại</span>
                </div>
                <div th:unless="${player.remove}" class="item-row">
                    <span style="font-weight: 600;" th:text="${player.id + '. ' + player.userName}"></span>
                    <span class="badge badge-green">Đang Sống</span>
                </div>
            </th:block>
        </div>
    </div>

    <div th:if="${not #lists.isEmpty(removed)}" class="card">
        <h3 style="margin-bottom: 12px; color: var(--danger); font-size: 1.1rem;">Danh tính người bị loại</h3>
        <div class="item-list">
            <div th:each="player : ${removed}" class="item-row" style="background: rgba(239,68,68,0.08);">
                <span style="font-weight: 500; text-decoration: line-through; color: var(--text-muted);"
                      th:text="${#strings.toUpperCase(player.userName)}"></span>
                <span th:classappend="${player.role == 'Spy'} ? 'badge-red' : (${player.role == 'Mũ Trắng'} ? 'badge-orange' : 'badge-green')"
                      class="badge" th:text="${player.role}"></span>
            </div>
        </div>
    </div>

    <div class="card" style="text-align: center;">
        <h3 style="margin-bottom: 12px; font-size: 1.1rem;">Bắn bỏ người chơi</h3>
        <div style="display: flex; gap: 8px; justify-content: center;">
            <input type="number" id="numberInput" class="input-text" placeholder="Nhập ID" style="width: 100px; text-align: center;">
            <button id="okButton" class="btn btn-danger" style="width: auto; padding: 12px 20px;">OK</button>
        </div>
        <a href="/sp/setup"  class="btn btn-primary" style="margin-top: 20px;">Về trang setup</a>
    </div>

    <script>
        document.getElementById("okButton").addEventListener("click", function() {
            var number = document.getElementById("numberInput").value;
            if(number === "") { alert("Vui lòng nhập ID người chơi!"); return; }
            fetch("/sp/remove/" + encodeURIComponent(number))
                .then(response => {
                    if(response.ok){ alert("Bắn bỏ thành công!"); window.location.reload(); }
                    else { alert("Lỗi: " + response.status); }
                })
                .catch(error => { alert("Gửi yêu cầu thất bại: " + error); });
        });
    </script>
</div>
</body>
</html>
