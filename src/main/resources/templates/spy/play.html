<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spyfall</title>
    <th:block th:replace="~{fragments/styles :: css}"></th:block>
</head>
<body>
<div class="container">
    <div class="header-section">
        <h1>Spyfall</h1>
        <p class="desc">Tìm ra gián điệp ẩn mình</p>
    </div>

    <!-- Not setup yet -->
    <div th:if="${notSetup}" class="card" style="text-align: center;">
        <h2 style="color: var(--danger); margin-bottom: 10px;">Ván đấu chưa được setup</h2>
        <p class="desc">Vui lòng liên hệ Admin để thiết lập phòng chơi mới.</p>
        <a href="/" class="btn btn-primary" style="margin-top: 20px;">Về Trang Chủ</a>
    </div>

    <!-- Normal play view -->
    <th:block th:unless="${notSetup}">
        <div class="card" style="text-align: center;">
            <h3 style="margin-bottom: 12px; color: var(--text-muted); font-size: 0.95rem;">VAI TRÒ / ĐỊA ĐIỂM CỦA BẠN:</h3>
            <div class="reveal-box blurred" onclick="this.classList.toggle('blurred')">
                <div class="reveal-placeholder">Nhấp để ẩn/hiện vai trò</div>
                <div class="reveal-content">
                    <h2 style="font-size: 1.8rem; color: #60a5fa;" th:text="${location}"></h2>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 14px; text-align: center; font-size: 1.1rem;">Danh sách địa điểm nghi vấn</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85rem;">
                <div th:each="item : ${dataPlay}"
                     style="padding: 8px 10px; background: rgba(15,23,42,0.45); border-radius: 8px; border: 1px solid var(--card-border); text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                    <span th:text="${item.id + '. ' + item.location}"></span>
                </div>
            </div>
        </div>

        <div class="card" style="text-align: center;">
            <h3 style="margin-bottom: 10px; font-size: 1.1rem;">Mã QR tham gia</h3>
            <div class="qr-container">
                <img th:src="${image}" alt="QR Code" class="qr-image">
            </div>
            <p class="desc" style="margin-top: 10px; font-size: 0.85rem;">Quét mã để thiết bị khác cùng vào chơi</p>
        </div>
    </th:block>
</div>
</body>
</html>
