<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Trò Ma Sói</title>
    <th:block th:replace="~{fragments/styles :: css}"></th:block>
    <style>
        #cupid { color: #f59e0b; font-style: normal; font-weight: 500; font-size: 0.8rem; display: block; margin-top: 4px; }
        .history-game-card { border: 1px solid var(--card-border); border-radius: 12px; padding: 12px; background: rgba(30,41,59,0.3); }
    </style>
</head>
<body>
<div class="container">
    <div class="header-section">
        <h1>Quản Trò Ma Sói</h1>
        <p class="desc">Bảng điều khiển ván đấu hiện tại</p>
    </div>

    <div class="card" style="text-align: center;">
        <div class="qr-container">
            <img th:src="${image}" alt="QR Code" class="qr-image" style="width: 150px; height: 150px;">
        </div>
        <p class="desc" style="font-size: 0.8rem; margin-top: 5px;">Quét mã QR để người chơi tham gia</p>
    </div>

    <div th:if="${not #strings.isEmpty(activeRoles)}" class="card" style="margin-bottom: 16px;">
        <h3 style="margin-bottom: 6px; font-size: 0.95rem; color: var(--text-muted);">Vai trò đặc biệt trong ván:</h3>
        <p style="font-weight: 600; font-size: 1rem; color: #a5b4fc;" th:text="${activeRoles}"></p>
    </div>

    <div class="card">
        <h3 style="margin-bottom: 14px; font-size: 1.1rem;">Danh sách người chơi</h3>
        <div class="item-list">
            <th:block th:each="item : ${players}">
                <div th:classappend="${#lists.contains(idSoi, item.id)} ? 'item-row' : 'item-row'"
                     th:style="${#lists.contains(idSoi, item.id)} ? 'border-left: 4px solid var(--danger); padding: 12px 16px;' : (${#lists.contains(idOutsider, item.id)} ? 'border-left: 4px solid var(--warning); padding: 12px 16px;' : 'border-left: 4px solid var(--success); padding: 12px 16px;')">
                    <span style="font-weight: 700; font-size: 1rem;"
                          th:text="${item.idPlayGame + '. ' + (item.nameMember != null ? item.nameMember : (item.ipData != null ? 'Ẩn danh' : 'Chưa nhận chức năng'))}"></span>
                    <span th:classappend="${#lists.contains(idSoi, item.id)} ? 'badge badge-red' : (${#lists.contains(idOutsider, item.id)} ? 'badge badge-orange' : 'badge badge-green')"
                          th:utext="${item.location}"></span>
                </div>
            </th:block>
        </div>
    </div>

    <!-- Soi Nguyen section -->
    <div th:if="${showSoiNguyen}" class="card" style="margin-top: 16px; text-align: center;">
        <h3 style="margin-bottom: 12px; font-size: 1.1rem;">Nguyền chúc của Sói</h3>
        <div style="display: flex; gap: 8px; justify-content: center;">
            <select class="selectSoiNguyen input-text" style="flex: 1; min-width: 150px; padding: 12px;">
                <th:block th:each="item : ${players}">
                    <option
                            th:if="${!#lists.contains(idSoi, item.id)}"
                            th:value="${item.idPlayGame}"
                            th:text="${item.idPlayGame + '-' + item.location + '-' + (item.nameMember != null ? item.nameMember : 'Ẩn danh')}">
                    </option>
                </th:block>
            </select>
            <button id="addSoiNguyen" class="btn btn-primary" style="width: auto; padding: 12px 20px;">Nguyền</button>
        </div>
    </div>

    <button id="endGame" class="btn btn-danger" style="margin-top: 24px;">Kết Thúc Ván Đấu</button>

    <script th:if="${showSoiNguyen}">
        document.getElementById('addSoiNguyen').addEventListener('click', function() {
            var soiNguyen = document.querySelector('.selectSoiNguyen');
            var data = { soiNguyen: soiNguyen.value };
            var playerText = soiNguyen.options[soiNguyen.selectedIndex].text;
            if (!confirm("Bạn có muốn nguyền chúc người chơi " + playerText + "?")) {
                return;
            }

            fetch('/ms/soiNguyen', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.text())
            .then(responseData => { alert('Response: ' + responseData); window.location.reload(); })
            .catch(error => console.error('Error:', error));
        });
    </script>
    <script>
        document.getElementById('endGame').addEventListener('click', function() {
            const userConfirmed = confirm("Bạn có chắc chắn muốn KẾT THÚC GAME?");
            if (userConfirmed) {
                fetch('/ms/end', { method: 'POST' })
                    .then(response => response.text())
                    .then(responseData => {
                        alert('Response: ' + responseData);
                        window.location.href = '/ms/run';
                    })
                    .catch(error => console.error('Error:', error));
            }
        });
    </script>
</div>
</body>
</html>
