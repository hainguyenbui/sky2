<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xử Lý Game</title>
    <th:block th:replace="~{fragments/styles :: css}"></th:block>
    <style>
        .qr-container { display:flex; justify-content:center; margin:10px 0; }
        .qr-image { width:120px; height:120px; border-radius:12px; border:3px solid var(--card-bg); }
        .super-section { background:rgba(139,92,246,0.1); border:2px solid rgba(139,92,246,0.3); border-radius:12px; padding:14px; margin-bottom:16px; }
        .super-title { font-weight:700; color:#a5b4fc; margin-bottom:10px; font-size:0.9rem; }
        .super-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; background:rgba(30,41,59,0.5); border-radius:8px; border-left:4px solid #a5b4fc; margin-bottom:6px; }
        .super-info { display:flex; flex-direction:column; gap:2px; }
        .super-name { font-weight:600; font-size:0.9rem; }
        .super-role { font-size:0.75rem; color:var(--text-muted); }
        .tbl-wrap { overflow-x:auto; margin-top:12px; }
        .gtbl { border-collapse:collapse; background:rgba(30,41,59,0.4); border:1px solid var(--card-border); min-width:100%; }
        .gtbl thead { background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(139,92,246,0.15)); }
        .gtbl th { padding:9px 10px; text-align:center; font-weight:600; font-size:0.8rem; color:#60a5fa; border-right:1px solid rgba(99,102,241,0.2); border-bottom:2px solid rgba(99,102,241,0.3); white-space:nowrap; position:sticky; top:0; z-index:2; background:rgba(20,30,50,0.97); }
        .gtbl thead tr:nth-child(2) th { top:38px; }
        .gtbl th.col-disabled { background:rgba(245,158,11,0.2) !important; color:#fbbf24 !important; }
        .gtbl th:last-child { border-right:none; }
        .gtbl th.th-player { text-align:left; min-width:120px; position:sticky; left:0; top:0; z-index:4; background:rgba(20,30,50,0.97); }
        .gtbl tbody tr { border-bottom:1px solid rgba(99,102,241,0.1); }
        .gtbl tbody tr:hover { background:rgba(59,130,246,0.05); }
        .gtbl td { padding:7px 8px; text-align:center; border-right:1px solid rgba(99,102,241,0.1); }
        .gtbl td:first-child { text-align:left; position:sticky; left:0; z-index:2; background:rgba(30,41,59,0.95); padding:8px 10px; }
        .gtbl td:last-child { border-right:none; }
        .pname { display:flex; flex-direction:column; gap:2px; }
        .pid { font-size:0.7rem; color:var(--text-muted); }
        .tog { display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:8px; border:2px solid var(--card-border); background:rgba(30,41,59,0.5); cursor:pointer; transition:all 0.2s; font-size:1rem; user-select:none; }
        .tog:hover:not(.locked):not(.col-disabled) { border-color:var(--primary); }
        .tog.on { background:linear-gradient(135deg,var(--primary),var(--primary-hover)); border-color:var(--primary); color:white; box-shadow:0 0 10px rgba(59,130,246,0.35); }
        .tog.locked { opacity:0.4; cursor:not-allowed; }
        .tog.col-disabled { opacity:0.35; cursor:not-allowed; border-color:rgba(245,158,11,0.3); }
        .process-btn { background:linear-gradient(135deg,#7c3aed,#6d28d9); color:white; border:none; padding:12px 26px; border-radius:10px; font-weight:600; cursor:pointer; margin-top:14px; margin-bottom:15px; width:100%; font-size:1rem; }
        .process-btn:active { transform:scale(0.98); }
        .kill-section { background:rgba(239,68,68,0.08); border:2px solid rgba(239,68,68,0.3); border-radius:14px; padding:14px; margin-top:16px; }
        .kill-title { color:#f87171; font-weight:700; margin-bottom:10px; font-size:1rem; }
        .ktbl { width:100%; border-collapse:collapse; }
        .ktbl th, .ktbl td { padding:8px; text-align:left; border-bottom:1px solid rgba(239,68,68,0.2); font-size:0.85rem; }
        .ktbl th { background:rgba(239,68,68,0.1); font-weight:600; color:#f87171; }
        .kbtn { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:6px; border:2px solid rgba(239,68,68,0.4); background:rgba(30,41,59,0.5); cursor:pointer; font-size:0.85rem; transition:all 0.2s; }
        .kbtn.sel { background:rgba(239,68,68,0.6); border-color:#f87171; color:white; }
        .kill-btn { background:linear-gradient(135deg,var(--danger),var(--danger-hover)); color:white; border:none; padding:11px 20px; border-radius:10px; font-weight:600; cursor:pointer; margin-top:10px; width:100%; }
        .kill-btn:active { transform:scale(0.98); }
        .help { font-size:0.78rem; color:var(--text-muted); padding:8px 10px; background:rgba(30,41,59,0.3); border-radius:8px; margin-bottom:12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-section">
        <h1>Xử Lý Game</h1>
        <p class="desc">Bảng hành động mỗi đêm</p>
    </div>

    <div class="card" style="text-align:center;padding:12px;">
        <div class="qr-container"><img th:src="${image}" alt="QR" class="qr-image"></div>
    </div>

    <div th:if="${hasSuperProtectedPlayers}" class="super-section">
        <div class="super-title">🛡️ Bảo Vệ Tối Cao — Khi BẬT: khóa toàn bộ toggle trong bảng</div>
        <th:block th:each="p : ${players}" th:if="${p['hasSuperProtected']}">
            <div class="super-item">
                <div class="super-info">
                    <span class="super-name" th:text="${p['name']}"></span>
                    <span class="super-role" th:text="${'#' + p['idPlayGame'] + ' — ' + p['roleName']}"></span>
                </div>
                <div th:class="'tog'"
                     th:id="${'sp-' + p['deviceId']}"
                     th:data-device="${p['deviceId']}"
                     th:data-name="${p['name']}"
                     th:data-roleid="${p['id']}"
                     th:data-rolename="${p['roleName']}"
                     th:onclick="'toggleSuper(this)'">🛡️</div>
            </div>
        </th:block>
    </div>

    <div class="help">💡 Chọn mục tiêu cho từng hành động đêm nay. Mỗi cột chỉ chọn 1 người.</div>

    <div id="thead-clone" style="overflow:hidden; position:sticky; top:0; z-index:10; margin-top:12px;"></div>
    <div class="tbl-wrap" th:if="${not #lists.isEmpty(players) and not #lists.isEmpty(columns)}">
        <table class="gtbl" id="roleTable">
            <thead>
                <tr>
                    <th class="th-player" rowspan="2">Người Chơi</th>
                    <th:block th:each="col : ${columns}">
                        <th th:if="${col['subCols'] == 1}" rowspan="2"
                            th:class="${col['disabled']} ? 'col-disabled' : ''"
                            th:text="${col['label']}"></th>
                        <th th:if="${col['subCols'] > 1}"
                            th:colspan="${col['subCols']}"
                            th:class="${col['disabled']} ? 'col-disabled' : ''"
                            th:text="${col['label']}"></th>
                    </th:block>
                </tr>
                <tr>
                    <th:block th:each="col : ${columns}" th:if="${col['subCols'] > 1}">
                        <th th:if="${col['isSoi']}"  th:class="${col['disabled']} ? 'col-disabled' : ''">🐺 Cắn</th>
                        <th th:if="${col['hasKill']}" th:class="${col['disabled']} ? 'col-disabled' : ''">⚔️ Giết</th>
                        <th th:if="${col['hasProt']}" th:class="${col['disabled']} ? 'col-disabled' : ''">🛡️ Cứu</th>
                        <th th:if="${col['hasConn']}" th:class="${col['disabled']} ? 'col-disabled' : ''">🔗 Chọn</th>
                    </th:block>
                </tr>
            </thead>
            <tbody>
                <th:block th:each="p : ${players}">
                    <tr>
                        <td>
                            <div class="pname">
                                <span th:text="${p['name']}"></span>
                                <span class="pid" th:text="${'#' + p['idPlayGame'] + ' · ' + p['roleName']}"></span>
                            </div>
                        </td>
                        <th:block th:each="col : ${columns}">
                            <th:block th:if="${col['subCols'] == 1}">
                                <td th:if="${col['isSoi']}">
                                    <div th:class="'tog' + (${col['disabled']} ? ' col-disabled' : '')"
                                         th:data-col="${'soi_' + col['roleId']}"
                                         th:data-roleid="${col['roleId']}"
                                         th:data-rolename="${col['label']}"
                                         th:data-deviceTarget="${p['deviceId']}"
                                         th:data-device="${col['deviceId']}"
                                         th:data-name="${p['name']}"
                                         th:data-targetRoleId="${p['id']}"
                                         th:data-targetRole="${p['roleName']}"
                                         th:onclick="${col['disabled']} ? '' : 'toggleCol(this)'">🐺</div>
                                </td>
                                <td th:if="${col['hasKill'] and !col['isSoi'] and !col['hasProt'] and !col['hasConn']}">
                                    <div th:class="'tog' + (${col['disabled']} ? ' col-disabled' : '')"
                                         th:data-col="${'kill_' + col['roleId']}"
                                         th:data-roleid="${col['roleId']}"
                                         th:data-rolename="${col['label']}"
                                         th:data-deviceTarget="${p['deviceId']}"
                                         th:data-device="${col['deviceId']}"
                                         th:data-name="${p['name']}"
                                         th:data-targetRoleId="${p['id']}"
                                         th:data-targetRole="${p['roleName']}"
                                         th:onclick="${col['disabled']} ? '' : 'toggleCol(this)'">⚔️</div>
                                </td>
                                <td th:if="${col['hasProt'] and !col['isSoi'] and !col['hasKill'] and !col['hasConn']}">
                                    <div th:class="'tog' + (${col['disabled']} ? ' col-disabled' : '')"
                                         th:data-col="${'prot_' + col['roleId']}"
                                         th:data-roleid="${col['roleId']}"
                                         th:data-rolename="${col['label']}"
                                         th:data-deviceTarget="${p['deviceId']}"
                                         th:data-device="${col['deviceId']}"
                                         th:data-name="${p['name']}"
                                         th:data-targetRoleId="${p['id']}"
                                         th:data-targetRole="${p['roleName']}"
                                         th:onclick="${col['disabled']} ? '' : 'toggleCol(this)'">🛡️</div>
                                </td>
                                <td th:if="${col['hasConn'] and !col['isSoi'] and !col['hasKill'] and !col['hasProt']}">
                                    <div th:class="'tog' + (${col['disabled']} ? ' col-disabled' : '')"
                                         th:data-col="${'conn_' + col['roleId']}"
                                         th:data-roleid="${col['roleId']}"
                                         th:data-rolename="${col['label']}"
                                         th:data-connvalue="${col['connValue']}"
                                         th:data-deviceTarget="${p['deviceId']}"
                                         th:data-device="${col['deviceId']}"
                                         th:data-name="${p['name']}"
                                         th:data-targetRoleId="${p['id']}"
                                         th:data-targetRole="${p['roleName']}"
                                         th:onclick="${col['disabled']} ? '' : 'toggleCol(this)'">🔗</div>
                                </td>
                            </th:block>
                            <th:block th:if="${col['subCols'] > 1}">
                                <td th:if="${col['isSoi']}">
                                    <div th:class="'tog' + (${col['disabled']} ? ' col-disabled' : '')"
                                         th:data-col="${'soi_' + col['roleId']}"
                                         th:data-roleid="${col['roleId']}"
                                         th:data-rolename="${col['label']}"
                                         th:data-deviceTarget="${p['deviceId']}"
                                         th:data-device="${col['deviceId']}"
                                         th:data-name="${p['name']}"
                                         th:data-targetRoleId="${p['id']}"
                                         th:data-targetRole="${p['roleName']}"
                                         th:onclick="${col['disabled']} ? '' : 'toggleCol(this)'">🐺</div>
                                </td>
                                <td th:if="${col['hasKill']}">
                                    <div th:class="'tog' + (${col['disabled']} ? ' col-disabled' : '')"
                                         th:data-col="${'kill_' + col['roleId']}"
                                         th:data-roleid="${col['roleId']}"
                                         th:data-rolename="${col['label']}"
                                         th:data-deviceTarget="${p['deviceId']}"
                                         th:data-device="${col['deviceId']}"
                                         th:data-name="${p['name']}"
                                         th:data-targetRoleId="${p['id']}"
                                         th:data-targetRole="${p['roleName']}"
                                         th:onclick="${col['disabled']} ? '' : 'toggleCol(this)'">⚔️</div>
                                </td>
                                <td th:if="${col['hasProt']}">
                                    <div th:class="'tog' + (${col['disabled']} ? ' col-disabled' : '')"
                                         th:data-col="${'prot_' + col['roleId']}"
                                         th:data-roleid="${col['roleId']}"
                                         th:data-rolename="${col['label']}"
                                         th:data-deviceTarget="${p['deviceId']}"
                                         th:data-device="${col['deviceId']}"
                                         th:data-name="${p['name']}"
                                         th:data-targetRoleId="${p['id']}"
                                         th:data-targetRole="${p['roleName']}"
                                         th:onclick="${col['disabled']} ? '' : 'toggleCol(this)'">🛡️</div>
                                </td>
                                <td th:if="${col['hasConn']}">
                                    <div th:class="'tog' + (${col['disabled']} ? ' col-disabled' : '')"
                                         th:data-col="${'conn_' + col['roleId']}"
                                         th:data-roleid="${col['roleId']}"
                                         th:data-rolename="${col['label']}"
                                         th:data-connvalue="${col['connValue']}"
                                         th:data-deviceTarget="${p['deviceId']}"
                                         th:data-device="${col['deviceId']}"
                                         th:data-name="${p['name']}"
                                         th:data-targetRoleId="${p['id']}"
                                         th:data-targetRole="${p['roleName']}"
                                         th:onclick="${col['disabled']} ? '' : 'toggleCol(this)'">🔗</div>
                                </td>
                            </th:block>
                        </th:block>
                    </tr>
                </th:block>
            </tbody>
        </table>
        <button class="process-btn" onclick="processNight()">🌙 Xử Lý Đêm</button>
    </div>

    <div class="kill-section">
        <div class="kill-title">⚔️ Xử Lý Giết (thủ công)</div>
        <table class="ktbl">
            <thead>
                <tr>
                    <th style="width:36px;">Chọn</th>
                    <th>Tên / ID</th>
                    <th>Vai Trò</th>
                </tr>
            </thead>
            <tbody>
                <th:block th:each="p : ${players}">
                    <tr>
                        <td>
                            <div class="kbtn"
                                 th:data-device="${p['deviceId']}"
                                 th:data-name="${p['name']}"
                                 onclick="toggleKill(this)">☐</div>
                        </td>
                        <td th:text="${p['idPlayGame'] + '. ' + p['name']}"></td>
                        <td th:text="${p['roleName']}" style="font-size:0.8rem;color:var(--text-muted);"></td>
                    </tr>
                </th:block>
            </tbody>
        </table>
        <input type="text" id="killReason" class="input-text" placeholder="Lý do giết (tùy chọn)" style="margin-top:10px;">
        <button class="kill-btn" onclick="executeKill()">⚔️ Xác Nhận Giết</button>
    </div>

    <button onclick="window.location.href='/ms/admin'" class="btn btn-primary" style="margin-top:20px;">← Quay Lại</button>
</div>

<script th:inline="javascript">
    const spDevices = /*[[${superProtectedDevices}]]*/ [];

    function isSuperLocked() {
        return spDevices.some(dev => {
            const el = document.getElementById('sp-' + dev);
            return el && el.classList.contains('on');
        });
    }

    function toggleSuper(el) {
        el.classList.toggle('on');
        updateLock();
    }

    function updateLock() {
        const locked = isSuperLocked();
<!--        document.querySelectorAll('#roleTable .tog:not(.col-disabled)').forEach(b => b.classList.toggle('locked', locked));-->
    }

    function toggleCol(el) {
        if (el.classList.contains('locked') || el.classList.contains('col-disabled')) return;
<!--        if (isSuperLocked()) return;-->
        const colKey = el.dataset.col;
        const isOn = el.classList.contains('on');
        document.querySelectorAll(`#roleTable .tog[data-col="${colKey}"]`).forEach(b => b.classList.remove('on'));
        if (!isOn) el.classList.add('on');
    }

    function processNight() {
        const onToggles = document.querySelectorAll('#roleTable .tog.on');

        const actions = Array.from(onToggles).map(el => ({
            targetDeviceId:   el.dataset.devicetarget,
            targetName: el.dataset.name,
            targetRoleId: el.dataset.targetroleid,
            targetRoleName: el.dataset.targetrole,
            roleId:     el.dataset.roleid,
            deviceId:   el.dataset.device,
            roleName:   el.dataset.rolename,
            colType:    el.dataset.col.split('_')[0],
            connValue:  el.dataset.connvalue || null
        }));

        // Thêm trạng thái superProtected  vào actions
        document.querySelectorAll('[id^="sp-"]').forEach(el => {
            actions.push({
                targetDeviceId:   el.dataset.device,
                targetName: el.dataset.name,
                roleId:     el.dataset.roleid,
                roleName:   el.dataset.rolename,
                colType:    'superProt',
                connValue:  el.classList.contains('on') ? 'ON' : 'OFF'
            });
        });

        if (!actions.length) { alert('Chưa chọn hành động nào!'); return; }

        const summary = actions.map(a => {
            const icon = a.colType === 'soi' ? '🐺' : a.colType === 'kill' ? '⚔️' : a.colType === 'prot' ? '🛡️' : '🔗';
            return `${icon} ${a.roleName} → ${a.targetName}`;
        }).join('\n');

        if (!confirm(`Kết quả đêm nay:\n${summary}\n\nXác nhận xử lý?`)) return;

        fetch('/ms/processNight', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(actions)
        }).then(r => r.text()).then(res => {
            // Reset conn cols theo connValue: 1/3/7 → off, 2 → giữ nguyên
            alert(res);
            window.location.reload();
        }).catch(() => alert('Lỗi khi xử lý!'));
    }

    function toggleKill(el) {
        const sel = el.classList.toggle('sel');
        el.textContent = sel ? '☑' : '☐';
    }

    function executeKill() {
        const selected  = document.querySelectorAll('.kbtn.sel');
        const deviceIds = Array.from(selected).map(b => b.dataset.device);
        if (!deviceIds.length) { alert('Chọn ít nhất 1 người!'); return; }
        const names  = Array.from(selected).map(b => b.dataset.name).join(', ');
        const reason = document.getElementById('killReason').value || '';
        if (!confirm(`Giết: ${names}?${reason ? '\nLý do: ' + reason : ''}`)) return;
        fetch('/ms/kill', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({deviceIds, reason})
        }).then(r => r.text()).then(res => { alert(res); window.location.reload(); })
          .catch(() => alert('Lỗi khi giết!'));
    }

    updateLock();

    // Sticky thead clone
    const wrap = document.querySelector('.tbl-wrap');
    const table = document.getElementById('roleTable');
    const clone = document.getElementById('thead-clone');
    if (wrap && table && clone) {
        const cloneTable = document.createElement('table');
        cloneTable.className = 'gtbl';
        cloneTable.style.cssText = 'margin:0; border-bottom:none;';
        cloneTable.appendChild(table.querySelector('thead').cloneNode(true));
        clone.appendChild(cloneTable);
        clone.style.display = 'none';
        wrap.addEventListener('scroll', () => { cloneTable.style.marginLeft = -wrap.scrollLeft + 'px'; });
        window.addEventListener('scroll', () => {
            const rect = wrap.getBoundingClientRect();
            const theadH = table.querySelector('thead').getBoundingClientRect().height;
            if (rect.top < 0 && rect.bottom > theadH) {
                clone.style.display = 'block';
                clone.style.width = wrap.clientWidth + 'px';
                cloneTable.style.marginLeft = -wrap.scrollLeft + 'px';
            } else {
                clone.style.display = 'none';
            }
        });
    }
</script>
</body>
</html>
